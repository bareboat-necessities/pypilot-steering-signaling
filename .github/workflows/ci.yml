name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout servo protocol dependency
        uses: actions/checkout@v4
        with:
          repository: bareboat-necessities/pypilot-servo-protocol
          path: deps/pypilot-servo-protocol
      - name: Checkout syslib dependency
        uses: actions/checkout@v4
        with:
          repository: bareboat-necessities/pypilot-syslib
          path: deps/pypilot-syslib
      - name: Configure
        run: cmake -S . -B build -DPYPILOT_SERVO_PROTOCOL_DIR="$PWD/deps/pypilot-servo-protocol" -DPYPILOT_SYSLIB_DIR="$PWD/deps/pypilot-syslib"
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  arduino:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout servo protocol dependency
        uses: actions/checkout@v4
        with:
          repository: bareboat-necessities/pypilot-servo-protocol
          path: deps/pypilot-servo-protocol
      - name: Checkout syslib dependency
        uses: actions/checkout@v4
        with:
          repository: bareboat-necessities/pypilot-syslib
          path: deps/pypilot-syslib
      - uses: arduino/setup-arduino-cli@v2
      - name: Install AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
      - name: Compile Arduino example for Mega
        run: |
          arduino-cli compile --fqbn arduino:avr:mega \
            --libraries "$PWD" \
            --libraries "$PWD/deps/pypilot-servo-protocol" \
            --libraries "$PWD/deps/pypilot-syslib" \
            "$PWD/examples/arduino/SteeringExample"
